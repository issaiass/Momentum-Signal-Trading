# config.example.yaml
# Copy to config.yaml and edit. config.yaml should NOT be committed to version
# control if it ever contains anything sensitive, keep secrets (API keys,
# SMTP credentials) in environment variables (.env for Docker, User env vars
# on native Windows) as documented in DEPLOYMENT.md, not in this file.

# Required before --live runs (not enforced in dry-run),
# a lightweight paper trail that a human reviewed and approved this exact
# config before it was used to trade real money.
metadata:
  version: "1.0.0"
  approved_by: null      # e.g. "your name", must be non-null for --live
  approved_date: null    # e.g. "2026-07-11", must be non-null for --live

# Email notification categories. CRITICAL (stop-loss executions,
# circuit-breaker trips, the capital-allocation error that aborts a run) is ALWAYS
# sent and cannot be disabled here, only STANDARD, PERIODIC, DAILY, and WARNING are filterable.
# Requires SMTP env vars set (see DEPLOYMENT.md). If sending via a Gmail account, SMTP_PASS
# must be a Gmail App Password, NOT your normal account password, generate one at
# https://myaccount.google.com/apppasswords (requires 2-Step Verification enabled on the
# account first).
notifications:
  send_standard: true             # routine rebalance BUY/SELL/HOLD summaries
  send_periodic: true             # monthly performance report
  monthly_report_day_of_month: 1  # null/omit to disable the monthly report entirely
  send_daily: false               # daily performance report, same content depth as the
                                   # monthly report (technical indicators for held positions,
                                   # since-inception Total Return/CAGR/Max Drawdown/Std Dev/
                                   # Sharpe/Sortino, a benchmark comparison chart), generated
                                   # EVERY day instead of monthly. Defaults to false (unlike
                                   # every other notification flag here, which default to
                                   # sending if omitted) because of the real recurring compute/
                                   # inbox-volume cost, an explicit, deliberate opt-in, not
                                   # something you get by accident from an old config.yaml.
  send_warning: true              # multi-portfolio capital-safety warnings (fixed
                                   # allocations exceeding the real account, ticker overlap
                                   # across portfolios). Gates the EMAIL only, the detailed
                                   # log line for each of these always fires regardless of
                                   # this setting, so the risk is never fully invisible even
                                   # with this set to false. Must be true/false, not a string,
                                   # validated at load time.
  send_email_command_feedback: true  # ACCEPTED/REJECTED/ERROR reply emails for
                                   # email-commanded remote actions (PAUSE/RESUME/STATUS/
                                   # etc., see below). Gates the EMAIL only, every attempt is
                                   # still logged to logs/email_commands_log.csv regardless of
                                   # this setting, an audit trail you could silence would defeat
                                   # its own purpose. Default true, matches this feature's
                                   # existing always-on behavior, set false to keep the audit
                                   # log but stop the reply-email traffic. Must be true/false,
                                   # not a string, validated at load time. See EMAIL_COMMANDS.md.

# Email-commanded remote actions (PAUSE/RESUME/SKIP_NEXT_REBALANCE
# auto-applied; LIQUIDATE/ADJUST_PARAM parsed+validated but require manual
# follow-through). Opt-in, entirely inactive unless the IMAP_HOST, IMAP_USER,
# IMAP_PASS, TRUSTED_SENDER_EMAIL env vars are all set. See EMAIL_COMMANDS.md.
# Nothing to configure here in config.yaml itself, env vars only, kept out
# of this file so the trusted sender address isn't committed anywhere.

# Every field below is a BacktestConfig field (src/momentum_trading/backtest/momentum_backtest.py),
# config.yaml's default_risk/risk_overrides pass straight through to it, so any field defined
# there is automatically accepted here too. This file documents EVERY BacktestConfig field
# (confirmed by enumerating the dataclass directly, not guessed); most fields apply to LIVE and
# BACKTEST both (via the shared resolve_target_weights()/compute_vol_scalar() etc.), some are
# LIVE-ONLY or BACKTEST-ONLY (research/notebook cost-model and crash-protection knobs with no
# effect on daily-runner), each field's own comment says which.
#
# NONE of these fields apply to risk_monitor.py. It is a deliberately INDEPENDENT, read-only
# oversight process (see CLAUDE.md/docs/RISK_CONSTRAINTS.md's "Independence from
# risk_monitor.py"): it never imports BacktestConfig or reads default_risk/risk_overrides at
# all, it has its own separate CLI flags instead (--portfolio, --initial-capital,
# --max-loss-pct, --log-dir, --config), and the ONLY thing it reads from this file directly is
# portfolios.<name>.total_value (below), not any risk-strategy field on this page. Don't look
# here for "the risk monitor's stop-loss setting", it doesn't have config fields of that kind,
# see `python -m momentum_trading.risk.risk_monitor --help`.
default_risk:
  holding_period: 1               # months between forced rebalances, accepts fractional values
                                   # that map onto weeks: 0.25 = every week, 0.5 = every 2 weeks,
                                   # 0.75 = every 3 weeks, 1.0 = every month (default), integers
                                   # >1 = every N months. Values below 0.25 (faster than weekly)
                                   # are allowed but trigger a non-blocking WARNING log + email
                                   # every run, not recommended, trading faster than weekly adds
                                   # cost without improving the signal. This is the field that
                                   # decides long-term vs. short-term momentum, below 1 switches
                                   # lookback_period below to week-scale too, see its comment.
  lookback_period: 12             # trailing months of returns used to RANK tickers by momentum,
                                   # distinct from holding_period above (how OFTEN you rebalance,
                                   # not how far back the signal looks). LIVE-ONLY, has no effect
                                   # on the backtest engine (which receives pre-computed picks).
                                   # Also accepts fractional values, but its granularity is tied
                                   # to holding_period's regime, not its own value: if
                                   # holding_period < 1 (weekly cadence, short-term momentum),
                                   # lookback_period is ALSO interpreted in week-quarters via the
                                   # same round(x * 4) formula as holding_period: 0.5 = 2 weeks,
                                   # 0.75 = 3 weeks, 1.0 = 4 weeks, 1.5 = 6 weeks. Example, a
                                   # short-term momentum config:
                                   #   holding_period: 0.25    # weekly rebalance
                                   #   lookback_period: 0.5    # 2-week momentum window
                                   # If holding_period >= 1 (monthly+, long-term momentum),
                                   # lookback_period stays in whole months, unchanged from
                                   # above. Values shorter than 2 weeks in the weekly regime are
                                   # allowed but trigger a non-blocking WARNING, a momentum
                                   # signal that short is genuinely noisy. Two more non-blocking
                                   # WARNINGs compare lookback_period against holding_period
                                   # directly (in the same regime-appropriate unit): the
                                   # "Momentum Persistence" constraint (lookback_period must be
                                   # strictly older than holding_period) and the
                                   # "Lookback-to-Hold Ratio" constraint (lookback_period /
                                   # holding_period should be roughly >= 3, a lower ratio risks
                                   # whipsawing). See docs/RISK_CONSTRAINTS.md.
  skip_month_guardrail: false     # the "Skip-Month" guardrail (classic academic "12-1
                                   # momentum" construction): when true AND lookback_period > 3
                                   # (months) AND holding_period >= 1 (monthly regime only),
                                   # excludes the most recent ~month from the momentum ranking
                                   # window, to avoid short-term reversal decay. Default false,
                                   # deliberately opt-in: enabling it changes what the SAME
                                   # lookback_period actually picks each rebalance, a real
                                   # signal-construction change, not just a new warning. See
                                   # docs/RISK_CONSTRAINTS.md.
  use_absolute_momentum: false    # the "Absolute Momentum (Macro)" constraint (Mandatory tier,
                                   # docs/RISK_CONSTRAINTS.md): Antonacci-style dual momentum,
                                   # when true, any pick whose OWN trailing return (not just its
                                   # rank relative to other picks) is negative gets swapped for
                                   # defensive_ticker below instead of being held. Distinct from
                                   # use_regime_filter above, which scales the WHOLE book by one
                                   # benchmark's trend, this swaps INDIVIDUAL picks by their own
                                   # momentum, complementary, can both be enabled at once.
                                   # Default false, deliberately opt-in like skip_month_guardrail
                                   # above: enabling it changes what the SAME picks actually
                                   # resolve to each rebalance, a real signal-construction
                                   # change, not just a new warning.
  defensive_ticker: BIL           # only meaningful when use_absolute_momentum is true, the
                                   # ticker substituted in for a negative-absolute-momentum pick
                                   # (e.g. 'BIL' T-bill ETF, 'SHY' short treasuries). Must be
                                   # priced alongside the portfolio's own tickers for this to
                                   # work, add it to that portfolio's own tickers: list above.
  persist_dry_run_state: false    # DRY-RUN-ONLY, no effect in --live (the broker is always
                                   # the source of truth there). Default false preserves
                                   # dry-run's existing behavior exactly: current_positions is
                                   # {} on every invocation, a stateless signal/sizing preview.
                                   # Set true to instead reconstruct a simulated portfolio from
                                   # the trade log's own dry_run=True rows, so dry-run behaves
                                   # like a persistent, no-IBKR-required paper ledger across
                                   # separate invocations. For an ACTUALLY broker-verified
                                   # persistent paper portfolio, prefer --live --port 7497
                                   # against a real IBKR paper account instead, see
                                   # docs/RUNNING.md's "Restart and Resume Behavior" section.
  commission: 0.0                 # flat $ commission charged per trade, BACKTEST-ONLY,
                                   # has no effect on --live (real commission is already
                                   # reflected in your broker's real account balance)
  exchange: NYSE                  # LIVE + BACKTEST. Which real trading-session calendar
                                   # is_rebalance_day()/_trading_days() use (via
                                   # pandas_market_calendars' mcal.get_calendar(exchange)) to
                                   # find the first REAL trading day of each rebalance period
                                   # (monthly or weekly) and roll forward past weekends/
                                   # holidays. Any exchange code pandas_market_calendars
                                   # supports is valid (e.g. NASDAQ, LSE, TSX), only change
                                   # this if your tickers actually trade on a different
                                   # exchange's real calendar than NYSE's, mismatching this
                                   # against where your tickers actually trade would target the
                                   # wrong exchange's holiday schedule.
  drift_threshold: 0.03           # only trade a name if |target_weight - current_weight| exceeds this
                                   # (skips trivial rebalances that aren't worth the trading cost)
  min_trade_size: 25.0            # skip any single trade below this $ notional
  max_turnover_pct: 0.20          # the "Turnover Limit" constraint (non-blocking WARNING):
                                   # Total_Positions_Changed / Total_Positions per rebalance, a
                                   # position-COUNT ratio, distinct from drift_threshold/
                                   # min_trade_size above, which are dollar-value filters. e.g.
                                   # 0.20 = flag for review if more than 20% of this rebalance's
                                   # tickers got a real BUY/SELL. High turnover is almost always
                                   # a sign of an over-sensitive signal.
  total_value_drift_warning_pct: 0.10  # LIVE-ONLY advisory (non-blocking WARNING), only for a
                                   # FIXED (non-null) total_value below. total_value never
                                   # auto-refreshes from real account P&L (a deliberate choice,
                                   # an allocation ceiling, not auto-compounding), this warns
                                   # when this portfolio's own real position value (its
                                   # configured tickers only, explicitly scoped, never a
                                   # sibling portfolio's shared-account positions) exceeds the
                                   # configured total_value by more than this fraction, a sign
                                   # the static number has gone stale. e.g. 0.10 = warn once
                                   # real positions are worth 10% more than the configured
                                   # ceiling. Has no effect on a total_value: null portfolio
                                   # (already tracks real account value by definition) or in
                                   # dry-run (no real positions to compare).
  low_capital_drop_warning_pct: 0.30  # non-blocking WARNING, fires in BOTH dry-run and --live.
                                   # IBKR has no fractional-equity order support at all, a
                                   # computed BUY under 1 share is dropped entirely rather than
                                   # ever reaching the broker (DROPPED_FRACTIONAL). e.g. 0.30 =
                                   # warn if more than 30% of a rebalance's intended BUYs get
                                   # dropped this way, a sign total_value is too small relative
                                   # to top_n and this portfolio's ticker prices for real capital
                                   # to actually get deployed. Distinct from max_turnover_pct
                                   # above (signal noise), this is about capital sizing. Names
                                   # the dropped tickers and suggests concrete levers (raise
                                   # total_value, lower top_n, prefer cheaper tickers).
  use_regime_filter: true         # true = skip new entries when regime_benchmark is below its SMA
  regime_benchmark: SPY           # benchmark ticker the regime filter checks against
  regime_sma_window: 150          # trading days in the regime filter's moving average
  target_portfolio_vol: 0.15      # the "Volatility Scaling" constraint (Mandatory tier,
                                   # docs/RISK_CONSTRAINTS.md): annualized vol target for the
                                   # WHOLE book, distinct from position_vol_budget below (which
                                   # caps a SINGLE ticker's weight). Realized portfolio vol over
                                   # portfolio_vol_lookback trading days is compared to this
                                   # target, gross exposure is scaled by target/realized
                                   # (clamped to [min_gross_exposure, max_gross_exposure]),
                                   # shrinking the whole book in a high-vol regime, letting it
                                   # run up to max_gross_exposure in a calm one. Applies to both
                                   # backtest and --live (compute_vol_scalar(), shared code, same
                                   # formula in both paths). Composes multiplicatively with the
                                   # regime filter above and the correlation-spike check below,
                                   # not a replacement for either.
  portfolio_vol_lookback: 21      # trailing trading days used to estimate realized portfolio
                                   # vol for the target_portfolio_vol scaling above (~1 month)
  vol_lookback_days: 63           # trailing trading days used for inverse-vol POSITION sizing
                                   # (~3 months), distinct from portfolio_vol_lookback above,
                                   # which is for the PORTFOLIO-level scalar, not per-ticker weights
  max_gross_exposure: 1.0         # never lever the book above 100% invested, an upper clamp on
                                   # every gross-exposure scalar (regime filter, vol targeting,
                                   # correlation spike) combined
  min_gross_exposure: 0.20        # floor so a bad regime/high vol/correlation spike never fully
                                   # flatlines the book to 0% invested, the same floor all three
                                   # defensive scalars above clamp down to
  max_position_weight: 0.35       # single-name cap, e.g. 0.35 = no position over 35% of the book,
                                   # FLAT, identical for every ticker regardless of its own vol
  position_vol_budget: null       # the "Volatility-Adjustment" (Scaling) constraint. null
                                   # (default) = disabled. When set, each position is ALSO
                                   # capped at position_vol_budget / that ticker's own trailing
                                   # realized (daily, unannualized) volatility, whichever of
                                   # that or max_position_weight above is more restrictive wins.
                                   # Complementary to max_position_weight, not redundant: a
                                   # low-vol name can be allowed a larger weight than a high-vol
                                   # name even under the same flat cap. Never allows a single
                                   # position's vol contribution to exceed this budget,
                                   # regardless of how strong the momentum signal is.
  stop_loss_pct: 0.12             # per-position stop-loss, as a fraction below entry price
  auto_execute_stop_loss: false   # true = auto-sell on stop-loss trigger; false = flag + email only
  attach_broker_stop_loss: false  # LIVE-ONLY. Belt-and-suspenders alongside
                                   # auto_execute_stop_loss above, NOT a replacement for it:
                                   # true attaches a REAL IBKR bracket order at BUY time (parent
                                   # BUY + child STP SELL, reusing stop_loss_pct above for the
                                   # stop offset), protecting the position at the BROKER ITSELF
                                   # even when this app isn't running, unlike
                                   # auto_execute_stop_loss's Python-side check, which only ever
                                   # runs when daily-runner --live is actually invoked.
                                   # auto_execute_stop_loss still has independent value even
                                   # with this on (it's the only mechanism for max_holding_days,
                                   # and reacts to a stop_loss_pct changed mid-position). See
                                   # docs/RISK_CONSTRAINTS.md's "Broker-Side Protective Stop".
  use_correlation_penalty: false  # true = downweight sizing for positions correlated with other
                                   # current picks (distinct from use_correlation_spike_regime below)
  correlation_lookback_days: 63   # LIVE + BACKTEST, only meaningful when use_correlation_penalty
                                   # is true. Trailing trading days used to compute the pairwise
                                   # correlation matrix inside resolve_target_weights() (shared
                                   # sizing function, same one both the backtest and --live use),
                                   # ~3 months by default. Most directly relevant to
                                   # strategy_type: correlation_weighted_momentum (its preset
                                   # sets use_correlation_penalty: true for you), but active for
                                   # ANY strategy_type once use_correlation_penalty is enabled.
  correlation_penalty_strength: 0.5   # LIVE + BACKTEST, [0, 1.0] (validated at load time), only
                                   # meaningful when use_correlation_penalty is true. 0 = no
                                   # penalty (identical to disabled), 1.0 = full pairwise-
                                   # correlation-based downweighting. 0.5 (default) is a
                                   # moderate middle ground; a value outside [0, 1.0] fails
                                   # config validation with a clear error naming this field.
  aggregate_drift_threshold: 0.0  # 0 = disabled (always rebalance if scheduled);
                                   # e.g. 0.02 = skip the WHOLE rebalance if aggregate drift is <2%
                                   # (applies to both backtest and --live, same formula)

  # Share granularity
  allow_fractional_shares: false   # true = size positions to 4dp fractional shares in the
                                    # BACKTEST and in sizing/drift math. LIVE execution against
                                    # IBKR always floors to whole shares at order-submission
                                    # time regardless of this setting, IBKR's API does not
                                    # support fractional EQUITY/ETF orders under any circumstances
                                    # (confirmed: not even via cashQty, which only works for
                                    # forex/CASH-pair orders). See DEPLOYMENT.md's
                                    # "Troubleshooting: IBKR order placement". Set true if you
                                    # still want precise backtest sizing; live orders are
                                    # unaffected either way.

  # LIVE ONLY. place_orders_ibkr() always submits SELLs first and waits for them
  # to clear before submitting BUYs (not configurable, there's no valid reason to skip
  # this). This field controls what happens if BUYs would still exceed real available cash
  # AFTER sells clear: false (default) = warn (always logged) and submit as computed, IBKR's
  # own fill/reject is the backstop. true = proportionally scale down BUY share counts
  # (floored to whole shares) to fit. Matters most on a CASH (non-margin) IBKR account,
  # where a BUY racing ahead of its funding SELL can be rejected or trigger a cash-account
  # violation; on margin it silently relies on buying power instead. See docs/RUNNING.md.
  auto_reduce_buys_on_insufficient_cash: false

  # LIVE ONLY, no effect on the backtest. A rebalance running at or after market close submits
  # plain MKT orders that IBKR/exchanges reject outright ("Order rejected - reason:Exchange is
  # closed", IBKR error 201), true switches every live order to LMT with outsideRth=True
  # instead, which IBKR DOES accept outside regular trading hours (MKT orders never work outside
  # RTH, confirmed against IBKR's own TWS API docs, this is a real order-type change, not just
  # a flag). Limit price is the last known price +/- a small buffer favoring fill likelihood.
  # Covers NASDAQ's standard extended sessions: pre-market 4:00-9:30am ET, after-hours
  # 4:00-8:00pm ET. Extended-hours liquidity is thinner than regular hours, expect a real
  # chance of no fill, a partial fill, or a worse price than the same order placed during RTH;
  # this is a genuine economic trade-off, not just a technical toggle. See DEPLOYMENT.md's
  # "Troubleshooting: IBKR order placement".
  allow_extended_hours: false

  # Selection: how many top-momentum-ranked tickers to actually hold each rebalance
  # (clamped to the portfolio's own tickers list if that's smaller, e.g. top_n: 10 with
  # only 6 tickers in that portfolio just holds all 6, no error). See STRATEGY_THEORY.md.
  # Overridable per portfolio via risk_overrides, same as every field on this page.
  top_n: 10

  # Crash protection
  max_portfolio_drawdown_pct: 0.0     # 0 = disabled; e.g. 0.20 = halt NEW entries at -20% from peak
                                       # equity (does not force-liquidate existing positions)
  use_correlation_spike_regime: false # true = detect a market-wide correlation spike across
                                       # holdings and react defensively (crash protection,
                                       # distinct from use_correlation_penalty above). Applies to
                                       # both backtest and --live.
  correlation_spike_short_window: 7       # LIVE + BACKTEST, only meaningful when
                                           # use_correlation_spike_regime is true.
                                           # detect_correlation_spike()'s SHORT recent window
                                           # (trading days), compared against
                                           # correlation_spike_baseline_window below to catch a
                                           # fast-moving crash ("correlation goes to 1") faster
                                           # than a single long rolling average would.
  correlation_spike_baseline_window: 63   # the LONGER baseline window (trading days, ~3 months)
                                           # the short window above is compared against.
  correlation_spike_threshold: 0.3        # a percentage-POINT jump, not a percentage: 0.3 means
                                           # "flag a spike when the short window's average
                                           # pairwise correlation exceeds the baseline's by more
                                           # than 30 percentage points." Strategy-agnostic, a
                                           # market-wide crash detector, not tied to any single
                                           # strategy_type.

  # Alternative sizing
  sizing_method: inverse_vol          # "inverse_vol" (default, underweights noisier names) or
                                       # "score_proportional" (stronger momentum gets more capital)

  # Selectable momentum strategy (docs/MOMENTUM_STRATEGIES.md), per-portfolio via risk_overrides,
  # same mechanism as every other field here (portfolio A can run dual_momentum while portfolio B
  # runs volatility_scaled_momentum on the same account). "momentum" (default) is the base
  # cross-sectional relative-momentum signal, changes nothing versus not setting this field at
  # all. Every other value either (a) auto-configures a bundle of existing fields below UNLESS you
  # explicitly set that specific field yourself, which always wins (dual_momentum,
  # volatility_scaled_momentum, correlation_weighted_momentum, rank_sign_momentum), or
  # (b) dispatches to a genuinely new ranking function (multi_timeframe_composite,
  # absolute_momentum, residual_momentum, path_dependent_momentum, hybrid_multi_factor, the last
  # one LIVE-ONLY, no backtest support, see docs/MOMENTUM_STRATEGIES.md for why).
  strategy_type: momentum             # "momentum" (default) / "relative_momentum" (explicit
                                       # alias, identical) / "dual_momentum" /
                                       # "volatility_scaled_momentum" / "residual_momentum" /
                                       # "absolute_momentum" / "rank_sign_momentum" /
                                       # "hybrid_multi_factor" / "path_dependent_momentum" /
                                       # "correlation_weighted_momentum" /
                                       # "multi_timeframe_composite"

  # ONLY meaningful when strategy_type: multi_timeframe_composite above, ignored otherwise.
  # Blends momentum scores across multiple lookback windows (months, resampled monthly first)
  # into ONE ranking signal instead of relying on a single lookback_period, via
  # core/functions_quant_extensions.py's blend_momentum_scores(). See docs/MOMENTUM_STRATEGIES.md.
  multi_timeframe_lookbacks: [3, 6, 12]   # trailing months per blended window, matches
                                           # blend_momentum_scores()'s own defaults exactly
  multi_timeframe_weights: null           # null (default) = equal weight per lookback above;
                                           # or a list of weights the SAME length as
                                           # multi_timeframe_lookbacks, e.g. [0.5, 0.3, 0.2] to
                                           # favor the shorter window

  # Additional execution safety checks
  max_dollar_drawdown: null           # e.g. 500.0, independent $ breaker alongside the % one above
  max_slippage_tolerance_pct: null    # e.g. 0.02, alert (not un-fill) on excess fill deviation
  max_price_staleness_minutes: null   # e.g. 30, abort a run rather than trade on frozen data
  max_holding_days: null              # e.g. 90, force-exit a position after N days regardless
                                       # of price. Applies to both backtest and --live
                                       # (live derives "days held" from the trade log); respects
                                       # auto_execute_stop_loss (flag-only vs. auto-exit) in live.
  max_bid_ask_spread_pct: null        # the "Liquidity/Slippage Monitor" constraint (Nice-to-Have
                                       # tier, docs/RISK_CONSTRAINTS.md). null (default) =
                                       # disabled. LIVE-ONLY, requires a real TWS/Gateway
                                       # connection AND, per IBKR's own rules, typically a paid
                                       # real-time market-data subscription for the ticker's
                                       # exchange, real-time NBBO is not included on IBKR's free/
                                       # delayed tier. e.g. 0.01 = drop an order (logged as
                                       # DROPPED_WIDE_SPREAD) rather than submit it into a
                                       # real-time bid-ask spread wider than 1%. A timeout / no
                                       # usable quote does NOT block the order, only a
                                       # confirmed-wide spread does. See docs/DEPLOYMENT.md's
                                       # IBKR troubleshooting section.

  # Capacity / market-impact check
  max_pct_of_adv: 0.0                 # 0 = disabled (default). LIVE-ONLY in practice (the
                                       # backtest ENGINE never calls this, only validates the
                                       # range), [0, 1.0]. Advisory, best-effort, NEVER blocks
                                       # trading: run()'s capacity check fetches ~60 days of
                                       # real volume and flags (CAPACITY WARNING, logged only) a
                                       # position whose target dollar size exceeds this fraction
                                       # of average daily dollar volume, a market-impact proxy.
                                       # e.g. 0.05 = warn if a target position is more than 5%
                                       # of a ticker's own average daily volume. The pure
                                       # check_capacity() function (core/functions_quant_
                                       # extensions.py) is also directly callable from a
                                       # notebook for ad-hoc backtest-side capacity analysis,
                                       # this field only wires it into the LIVE path.

  # Backtest-only (research/notebook use, no effect on daily-runner). run_risk_managed_backtest()
  # is the ONLY consumer of every field in this block, none of them are read anywhere in the
  # --live or dry-run execution path, setting these in a portfolio's risk_overrides has zero
  # effect on real or simulated live trading, only on a backtest run started from a notebook
  # that points at THIS config.yaml for its BacktestConfig kwargs.
  initial_capital: 100000.0           # starting $ for a SIMULATED backtest equity curve. NOT the
                                       # same field as a portfolio's own total_value above (that
                                       # one sizes real/simulated LIVE positions), a common
                                       # confusion point, the two are never read by the same code
                                       # path and can safely differ.
  base_slippage_bps: 2.0              # baseline simulated execution slippage, in basis points
                                       # (2.0 = 0.02%), applied to every backtest fill regardless
                                       # of vol. _slippage_bps() (momentum_backtest.py).
  vol_slippage_multiplier: 0.5        # extra simulated slippage layered on top of
                                       # base_slippage_bps, scaled by the traded ticker's own
                                       # trailing annualized vol (higher-vol names get modeled as
                                       # more expensive to trade), 0 = disable the vol scaling
                                       # entirely and use a flat base_slippage_bps for every trade.
  random_seed: 42                     # seeds np.random.default_rng() for the backtest's
                                       # reproducible simulated-fill jitter, same seed = identical
                                       # backtest run every time, change it to sample a different
                                       # draw of the same jitter distribution.
  monthly_contribution: 0.0           # $ added to the simulated backtest's cash balance at each
                                       # rebalance date, 0 (default) = no recurring contribution,
                                       # models a systematic dollar-cost-averaging backtest instead
                                       # of a single lump-sum initial_capital.
  log_file_path: trades_log.txt       # where run_risk_managed_backtest() writes its own
                                       # plain-text per-trade backtest log (fills, slippage,
                                       # contributions, reduce-only skips). UNRELATED to
                                       # daily_runner.py's real, hash-chained
                                       # logs/live_trades_log_<portfolio>.csv audit trail, this
                                       # one is backtest-only and gets overwritten ("w" mode) on
                                       # every run, not append-only.

  # Liquidity-stress crash protection (BACKTEST-ONLY, distinct from use_correlation_spike_regime
  # above, which IS live). Simulates execution quality degrading faster than a long trailing
  # window would show: compares each traded ticker's MOST RECENT liquidity_stress_recent_days of
  # vol against its own trailing vol_lookback_days baseline, and reacts when the recent spike
  # exceeds liquidity_stress_vol_ratio.
  liquidity_stress_multiplier: 1.0    # 1.0 (default) = disabled, the liquidity-stress check
                                       # never runs. > 1.0 (e.g. 2.0) = during a detected spike,
                                       # multiply that trade's simulated slippage (from
                                       # base_slippage_bps/vol_slippage_multiplier above) by this
                                       # factor, modeling worse fills exactly when a real book
                                       # would also be thinner.
  liquidity_stress_recent_days: 5     # trading days in the "recent" window compared against the
                                       # ticker's own trailing vol_lookback_days baseline, must be
                                       # >= 1.
  liquidity_stress_vol_ratio: 2.0     # recent-vol / baseline-vol ratio that counts as a stress
                                       # spike, e.g. 2.0 = recent vol running at more than double
                                       # the trailing average. Must be > 0.
  liquidity_stress_reduce_only: false # false (default) = a detected spike only multiplies
                                       # slippage (above). true = ALSO blocks new simulated BUYs
                                       # (never SELLs) into that ticker for the rest of the stress
                                       # window, a stricter, opt-in crash-protection mode, logged
                                       # to log_file_path as a REDUCE-ONLY skip line.

# Account-wide Drawdown Circuit Breaker (Recommended tier, docs/RISK_CONSTRAINTS.md),
# deliberately a TOP-LEVEL field, not inside default_risk/risk_overrides: it's account-scoped,
# not per-portfolio (a per-portfolio override of an account-wide concept would be incoherent,
# which portfolio's override would win?). Distinct from default_risk.max_portfolio_drawdown_pct
# above, which is PER-PORTFOLIO (halts only that one portfolio). This tracks ONE peak for the
# SUM of every portfolio's resolved capital, and when tripped, halts EVERY portfolio sharing
# this real IBKR account at once (writes each one's own circuit_breaker_halted_<name>.flag, the
# same file the per-portfolio breaker already uses, so resuming still uses the existing
# `daily-runner --resume-trading <name>`, called once per affected portfolio).
account_wide_max_drawdown_pct: 0.0    # 0 = disabled (default); e.g. 0.25 = halt ALL portfolios
                                       # when the account's total resolved capital drops 25%
                                       # from its own tracked peak

portfolios:
  portfolio1:
    tickers: [SPY, QQQ, XLK, XLF, XLE, XLY, XLP, XLU, GLD, TLT, BIL]
    custom_weights: null          # null = algorithmic inverse-vol sizing
    total_value: null             # null = this portfolio gets a share of the REMAINDER of the
                                   # real IBKR account value after every OTHER portfolio's fixed
                                   # total_value is subtracted first (--live only; dry-run gives
                                   # each null portfolio its own flat $1000 placeholder instead,
                                   # never divided). ANY number of portfolios across this whole
                                   # file may be null (zero, one, or several); if more than one
                                   # is null, the remainder is split EQUALLY among them, e.g. a
                                   # $10,000 account with one $2,500 fixed portfolio and two null
                                   # portfolios gives each null portfolio $3,750. Refuses to run
                                   # (ValueError) if the fixed portfolios already consume the
                                   # whole account, naming every null portfolio that would have
                                   # shared a zero/negative remainder. A total_value: null
                                   # portfolio's resolved capital is NOT visible to
                                   # risk_monitor.py (deliberately independent, see
                                   # docs/DEPLOYMENT.md's "Independent risk oversight" section),
                                   # read it off daily_runner's own startup log line and pass it
                                   # explicitly via risk_monitor.py's --initial-capital.
    # risk_overrides:              # optional: override ANY default_risk field for THIS
    #   stop_loss_pct: 0.10         # portfolio only, e.g. a tighter stop, a different top_n
    #   top_n: 5                    # than the default (see portfolio2 below), a shorter/longer
    #   lookback_period: 6          # momentum ranking window (months, LIVE-ONLY), or a different
    #   holding_period: 3           # rebalance cadence (months) than every other portfolio here

  portfolio2:
    tickers: [XLF, XLE, GLD, TLT]
    custom_weights:
      XLF: 0.4
      XLE: 0.3
      GLD: 0.2
      TLT: 0.1
    total_value: 2500.0
    risk_overrides:
      use_correlation_penalty: true
      top_n: 3    # e.g. this portfolio holds only its top 3 of 4 tickers each rebalance
                  # (whichever of custom_weights' 4 entries didn't make the cut is
                  # dropped and the rest renormalize to sum to 1.0), independent of
                  # default_risk.top_n or any other portfolio's override
