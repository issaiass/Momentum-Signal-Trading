services:
  momentum-signal:
    build: .
    container_name: momentum-signal
    restart: unless-stopped
    environment:
      - MOMENTUM_TRADING_ROOT=/app
      # Cron schedule: standard 5-field cron syntax, evaluated in the
      # container's TZ (America/New_York, set in the Dockerfile). Changing these only
      # needs `docker compose up -d` (container recreate), NOT `--build`, the
      # entrypoint regenerates /etc/cron.d/momentum-cron from these on every start.
      # Defaults: daily-runner at 9:35am ET weekdays; risk_monitor hourly 9am-4pm ET weekdays.
      # DAILY_RUNNER_CRON is NOT how you set daily/weekly/monthly rebalancing, leave it at the
      # default for every cadence; that's config.yaml's holding_period instead. See
      # docs/DEPLOYMENT.md's "Choosing a rebalance cadence" section.
      - DAILY_RUNNER_CRON=${DAILY_RUNNER_CRON:-35 9 * * 1-5}
      # RISK_MONITOR_CRON default (hourly 9am-4pm ET) is a generic catch-all. Recommended,
      # regime-specific alternatives (docs/DEPLOYMENT.md's "Recommended risk_monitor.py timing",
      # docs/RISK_CONSTRAINTS.md's "Stop-Loss Width"): short-term/weekly portfolios check twice
      # daily (10:00 AM + 3:30 PM ET, skips the open's first-30-min noise, captures the day's
      # near-final trend before close); long-term/monthly portfolios check once, at the close
      # (RISK_MONITOR_CRON=45 15 * * 1-5, 3:45pm ET, closing prices set the official daily trend,
      # avoids reacting to intraday whipsaws). This ONE value applies to EVERY portfolio listed
      # in RISK_MONITOR_PORTFOLIOS below, it cannot give two portfolios two different schedules,
      # nor give one portfolio two different times in a day, mixing regimes in one container
      # needs a host-level cron/Task Scheduler `docker exec` workaround instead, see that
      # DEPLOYMENT.md section for the copy-pasteable recipe.
      - RISK_MONITOR_CRON=${RISK_MONITOR_CRON:-0 9-16 * * 1-5}
      # Space-separated portfolio names to independently risk-monitor, one
      # cron entry each, must match names under config.yaml's portfolios: key.
      # Defaults to just "portfolio1"; add more (e.g. "portfolio1 portfolio2") if
      # config.yaml defines additional portfolios you want automated oversight for.
      # Note: momentum/stop-loss strategy parameters (holding_period, lookback_period,
      # stop_loss_pct, etc.) are NOT set here or anywhere in this file, they're per-portfolio
      # fields in config.yaml's default_risk/risk_overrides, see config.example.yaml's comments
      # and docs/RISK_CONSTRAINTS.md's "Recommended Config Presets"/"Stop-Loss Width" sections
      # for the recommended values per short-term/long-term regime.
      - RISK_MONITOR_PORTFOLIOS=${RISK_MONITOR_PORTFOLIOS:-portfolio1}
      - FMP_API_KEY=${FMP_API_KEY:-}
      - EODHD_API_KEY=${EODHD_API_KEY:-}
      # IBKR host: use host.docker.internal on Mac/Windows Docker Desktop;
      # on Linux, use --network host or the host machine's real IP instead.
      # IBKR_PORT is the default for daily-runner's --port (paper 7497 / live 7496),
      # an explicit --port in the crontab command still overrides it.
      - IBKR_HOST=${IBKR_HOST:-host.docker.internal}
      - IBKR_PORT=${IBKR_PORT:-7497}
      # Email alerting (daily_runner.py), all four required for alerts to send;
      # missing any of them logs the alert instead of failing silently.
      # SMTP_PROVIDER selects the auth mechanism: "gmail" (SMTP_PASS, default)
      # or "outlook" (OAuth2 via MS_OAUTH_CLIENT_ID below).
      - SMTP_PROVIDER=${SMTP_PROVIDER:-gmail}
      - SMTP_HOST=${SMTP_HOST:-}
      # 587 (STARTTLS) is the common default, but some networks/Docker hosts block it at
      # the raw TCP level while leaving 465 (implicit TLS/SMTP_SSL) open, confirmed
      # directly against this project's own container, see core/smtp_auth.py's connect().
      # Set SMTP_PORT=465 here if every SMTP send times out despite correct credentials.
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - ALERT_TO_EMAIL=${ALERT_TO_EMAIL:-}
      # Per-attempt SMTP connect/send timeout in seconds (default 30), 2 attempts total,
      # see core/smtp_auth.py's connect()/send_with_retry().
      - SMTP_TIMEOUT_SECONDS=${SMTP_TIMEOUT_SECONDS:-30}
      # Outlook.com/Hotmail/Microsoft 365 only: OAuth2 in place of SMTP_PASS (basic
      # auth is disabled on those accounts). See docs/DEPLOYMENT.md. The token
      # cache lives under ./data, which is already volume-mounted below, so the
      # one-time device-code login survives container restarts/rebuilds.
      - MS_OAUTH_CLIENT_ID=${MS_OAUTH_CLIENT_ID:-}
      - MS_OAUTH_TENANT=${MS_OAUTH_TENANT:-consumers}
      # Email-commanded remote actions, opt-in, all four required to activate
      - IMAP_HOST=${IMAP_HOST:-}
      - IMAP_USER=${IMAP_USER:-}
      - IMAP_PASS=${IMAP_PASS:-}
      - TRUSTED_SENDER_EMAIL=${TRUSTED_SENDER_EMAIL:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data     # live_trades_log*.csv persist here across container restarts/rebuilds
    # network_mode: host   # uncomment on Linux if connecting to a local TWS/Gateway instance
